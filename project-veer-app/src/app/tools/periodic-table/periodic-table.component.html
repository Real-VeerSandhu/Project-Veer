<app-toolbar></app-toolbar>
<div class="main-container">
    <div class="p-table">
        <ng-container *ngFor="let e of periodicTable.elements | slice: 0:57; let i = index">
            <div [style.grid-column]="e.xpos">
                <div class="element">
                    <div class="number">
                        {{e.number}}
                    </div>
                    <div class="symbol">
                        {{e.symbol}}
                    </div>
                    <div class="name">
                        {{e.name}}
                    </div>
                    <button mat-stroked-button class="element-button" (click)="openInfo(i)"></button>
                </div>
            </div>
        </ng-container>
        <ng-container *ngFor="let e of periodicTable.elements | slice: 71:89; let i = index">
            <div [style.grid-column]="e.xpos">
                <div class="element">
                    <div class="number">
                        {{e.number}}
                    </div>
                    <div class="symbol">
                        {{e.symbol}}
                    </div>
                    <div class="name">
                        {{e.name}}
                    </div>
                    <button mat-stroked-button class="element-button" (click)="openInfo(i+71)"></button>
                </div>
            </div>
        </ng-container>
        <ng-container *ngFor="let e of periodicTable.elements | slice: 103:118; let i = index">
            <div [style.grid-column]="e.xpos">
                <div class="element">
                    <div class="number">
                        {{e.number}}
                    </div>
                    <div class="symbol">
                        {{e.symbol}}
                    </div>
                    <div class="name">
                        {{e.name}}
                    </div>
                    <button mat-stroked-button class="element-button" (click)="openInfo(i+103)"></button>
                </div>
            </div>
        </ng-container>
    </div>
    <div class="heavy-metals">
        <ng-container *ngFor="let e of periodicTable.elements | slice: 57:71; let i = index ">
            <div [style.grid-column]="e.xpos">
                <div class="element">
                    <div class="number">
                        {{e.number}}
                    </div>
                    <div class="symbol">
                        {{e.symbol}}
                    </div>
                    <div class="name">
                        {{e.name}}
                    </div>
                    <button mat-stroked-button class="element-button" (click)="openInfo(i+57)"></button>
                </div>
            </div>
        </ng-container>
        <ng-container *ngFor="let e of periodicTable.elements | slice: 89:103; let i = index">
            <div [style.grid-column]="e.xpos">
                <div class="element">
                    <div class="number">
                        {{e.number}}
                    </div>
                    <div class="symbol">
                        {{e.symbol}}
                    </div>
                    <div class="name">
                        {{e.name}}
                    </div>
                    <button mat-stroked-button class="element-button" (click)="openInfo(i+89)"></button>
                </div>
            </div>
        </ng-container>
    </div>
</div>
